<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理者ログイン</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","Meiryo",sans-serif;background:#1a252f;
     display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#2c3e50;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.4);
      padding:40px;width:100%;max-width:340px}
h1{font-size:18px;color:#ecf0f1;margin-bottom:6px;text-align:center}
.sub{font-size:12px;color:#7f8c8d;text-align:center;margin-bottom:28px}
label{display:block;font-size:11px;font-weight:700;color:#95a5a6;margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase}
input{width:100%;padding:10px 12px;background:#1a252f;border:1px solid #34495e;
      border-radius:6px;font-size:14px;color:#ecf0f1;margin-bottom:20px;outline:none;transition:border-color .15s}
input:focus{border-color:#3498db}
.btn{width:100%;padding:11px;background:#3498db;color:#fff;border:none;
     border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s}
.btn:hover{background:#2980b9}
.flash{background:#c0392b;color:#fff;border-radius:6px;
       padding:10px 14px;margin-bottom:16px;font-size:13px;text-align:center}
</style>
</head>
<body>
<div class="card">
  <h1>🔐 管理者ページ</h1>
  <p class="sub">TaskFlow Admin</p>
  {% with messages = get_flashed_messages() %}
    {% if messages %}{% for msg in messages %}
      <div class="flash">{{ msg }}</div>
    {% endfor %}{% endif %}
  {% endwith %}
  <form method="POST">
    <label>パスワード</label>
    <input type="password" name="password" required autofocus>
    <button type="submit" class="btn">ログイン</button>
  </form>
</div>
</body>
</html>
