<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — チームのタスクを、もっとシンプルに。</title>
<meta name="description" content="TaskFlow はガントチャート付きのタスク管理ツールです。">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c-bg:#0b0f1a;--c-surface:#131929;--c-border:#1e2d45;
  --c-primary:#3b82f6;--c-primary-dark:#2563eb;--c-accent:#06b6d4;
  --c-text:#e2e8f0;--c-muted:#64748b;
}
html{scroll-behavior:smooth}
body{font-family:"Segoe UI","Noto Sans JP","Noto Sans",sans-serif;background:var(--c-bg);color:var(--c-text);line-height:1.7;overflow-x:hidden}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(11,15,26,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--c-border)}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;gap:24px}
.logo{font-size:20px;font-weight:800;color:#fff;text-decoration:none;letter-spacing:-.02em;flex-shrink:0}
.logo span{color:var(--c-primary)}
.nav-links{display:flex;gap:20px;margin-left:auto}
.nav-links a{color:var(--c-muted);text-decoration:none;font-size:14px;transition:color .15s}
.nav-links a:hover{color:var(--c-text)}

/* ── Language switcher ── */
.lang-switcher{position:relative;flex-shrink:0}
.lang-btn{background:transparent;border:1px solid var(--c-border);color:var(--c-muted);padding:5px 12px;border-radius:6px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:border-color .15s}
.lang-btn:hover{border-color:var(--c-primary);color:var(--c-text)}
.lang-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:#1e293b;border:1px solid var(--c-border);border-radius:8px;overflow:hidden;display:none;min-width:140px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:200}
.lang-dropdown.open{display:block}
.lang-option{display:flex;align-items:center;gap:8px;padding:9px 14px;font-size:13px;cursor:pointer;transition:background .12s;color:var(--c-text)}
.lang-option:hover{background:rgba(59,130,246,.12)}
.lang-option.active{color:var(--c-primary);font-weight:700}
.lang-flag{font-size:16px}

.nav-cta{background:var(--c-primary);color:#fff;padding:8px 18px;border-radius:6px;font-size:14px;font-weight:700;text-decoration:none;transition:background .15s;flex-shrink:0}
.nav-cta:hover{background:var(--c-primary-dark)}

.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:100px 24px 80px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:800px;background:radial-gradient(circle,rgba(59,130,246,.15) 0%,transparent 70%);pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:var(--c-primary);font-size:12px;font-weight:700;padding:4px 14px;border-radius:20px;margin-bottom:28px;letter-spacing:.06em}
.hero h1{font-size:clamp(32px,6vw,68px);font-weight:900;line-height:1.1;letter-spacing:-.03em;margin-bottom:24px}
.hero h1 .grad{background:linear-gradient(135deg,var(--c-primary),var(--c-accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:clamp(15px,2vw,19px);color:var(--c-muted);max-width:560px;margin:0 auto 40px}
.hero-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.btn-primary{background:var(--c-primary);color:#fff;padding:14px 32px;border-radius:8px;font-size:16px;font-weight:700;text-decoration:none;transition:background .15s,transform .1s}
.btn-primary:hover{background:var(--c-primary-dark);transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--c-text);padding:14px 32px;border-radius:8px;font-size:16px;font-weight:700;text-decoration:none;border:1px solid var(--c-border);transition:border-color .15s}
.btn-ghost:hover{border-color:var(--c-primary)}
.hero-sub{margin-top:20px;font-size:13px;color:var(--c-muted)}

section{padding:96px 24px}
.section-inner{max-width:1100px;margin:0 auto}
.section-label{font-size:12px;font-weight:700;letter-spacing:.1em;color:var(--c-primary);text-transform:uppercase;margin-bottom:12px}
.section-title{font-size:clamp(26px,4vw,42px);font-weight:800;letter-spacing:-.02em;margin-bottom:16px}
.section-desc{font-size:16px;color:var(--c-muted);max-width:540px}

#features{background:var(--c-surface)}
.features-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:24px;margin-top:56px}
.feature-card{background:var(--c-bg);border:1px solid var(--c-border);border-radius:12px;padding:28px;transition:border-color .2s,transform .2s}
.feature-card:hover{border-color:var(--c-primary);transform:translateY(-4px)}
.feature-icon{width:44px;height:44px;border-radius:10px;background:rgba(59,130,246,.12);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px}
.feature-card h3{font-size:17px;font-weight:700;margin-bottom:8px}
.feature-card p{font-size:14px;color:var(--c-muted);line-height:1.6}

#demo{text-align:center}
.screen-wrap{margin-top:56px;border-radius:12px;overflow:hidden;border:1px solid var(--c-border);box-shadow:0 32px 80px rgba(0,0,0,.5)}
.screen-bar{background:#1e2d45;padding:12px 16px;display:flex;align-items:center;gap:8px}
.dot{width:12px;height:12px;border-radius:50%}
.dot-r{background:#ff5f57}.dot-y{background:#ffbd2e}.dot-g{background:#28c840}
.screen-body{background:#0f172a;padding:32px;display:flex;flex-direction:column;gap:12px}
.mock-header{background:#1a252f;border-radius:6px;height:40px;display:flex;align-items:center;gap:8px;padding:0 16px}
.mock-tab{background:#3498db;height:28px;padding:0 16px;border-radius:4px;display:flex;align-items:center;font-size:12px;color:#fff;font-weight:700}
.mock-tab.inactive{background:transparent;color:#8fa3b1}
.mock-row{background:#1e293b;border-radius:6px;height:36px;display:flex;align-items:center;padding:0 14px;gap:10px}
.mock-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.mock-badge.done{background:#166534;color:#4ade80}
.mock-badge.wip{background:#92400e;color:#fbbf24}
.mock-badge.todo{background:#1e3a5f;color:#60a5fa}
.mock-text{font-size:12px;color:#94a3b8}
.mock-bar-wrap{flex:1;height:8px;background:#1e293b;border-radius:4px;overflow:hidden;margin:0 8px}
.mock-bar{height:100%;border-radius:4px}

#pricing{background:var(--c-surface)}
.pricing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:24px;margin-top:56px;max-width:680px}
.price-card{background:var(--c-bg);border:1px solid var(--c-border);border-radius:12px;padding:32px;position:relative}
.price-card.pro{border-color:var(--c-primary);box-shadow:0 0 32px rgba(59,130,246,.15)}
.pro-badge-wrap{text-align:center;margin-bottom:-13px}
.pro-badge{display:inline-block;background:var(--c-primary);color:#fff;font-size:11px;font-weight:700;padding:3px 16px;border-radius:20px}
.plan-name{font-size:13px;font-weight:700;color:var(--c-muted);margin-bottom:8px;letter-spacing:.06em;text-transform:uppercase}
.plan-price{font-size:46px;font-weight:900;letter-spacing:-.03em;margin-bottom:4px}
.plan-price span{font-size:15px;font-weight:400;color:var(--c-muted)}
.plan-desc{font-size:13px;color:var(--c-muted);margin-bottom:24px}
.plan-features{list-style:none;margin-bottom:32px}
.plan-features li{font-size:14px;padding:7px 0;border-bottom:1px solid var(--c-border);display:flex;align-items:center;gap:8px}
.plan-features li::before{content:"✓";color:#4ade80;font-weight:700;flex-shrink:0}
.plan-features li.no::before{content:"—";color:var(--c-muted)}
.plan-features li.no{color:var(--c-muted)}
.btn-plan{display:block;width:100%;padding:13px;text-align:center;border-radius:8px;font-size:15px;font-weight:700;text-decoration:none;transition:background .15s}
.btn-plan-free{background:var(--c-surface);color:var(--c-text);border:1px solid var(--c-border)}
.btn-plan-free:hover{border-color:var(--c-primary)}
.btn-plan-pro{background:var(--c-primary);color:#fff}
.btn-plan-pro:hover{background:var(--c-primary-dark)}

#cta{text-align:center;background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(6,182,212,.08));border-top:1px solid var(--c-border)}
footer{background:var(--c-surface);border-top:1px solid var(--c-border);padding:32px 24px;text-align:center;font-size:13px;color:var(--c-muted)}

.fade-up{opacity:0;transform:translateY(32px);transition:opacity .6s ease,transform .6s ease}
.fade-up.visible{opacity:1;transform:none}

@media(max-width:600px){
  .nav-links{display:none}
  .nav-inner{gap:12px}
}
</style>
</head>

let currentLang = localStorage.getItem("tf_lang") || "ja";

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem("tf_lang", lang);
  applyLang();
  document.getElementById("lang-dropdown").classList.remove("open");
  document.querySelectorAll(".lang-option").forEach(el => {
    el.classList.toggle("active", el.textContent.trim().includes(I18N[lang].lang_label));
  });
}

function applyLang() {
  const t = I18N[currentLang];
  document.documentElement.lang = currentLang;
  document.getElementById("lang-flag").textContent = t.lang_flag;
  document.getElementById("lang-label").textContent = t.lang_label;
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.dataset.i18n;
    if (!t[key]) return;
    if (key.endsWith("_html")) el.innerHTML = t[key];
    else el.textContent = t[key];
  });
}

function toggleLang() {
  document.getElementById("lang-dropdown").classList.toggle("open");
}
document.addEventListener("click", e => {
  if (!e.target.closest(".lang-switcher"))
    document.getElementById("lang-dropdown").classList.remove("open");
});

applyLang();

const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add("visible"); });
}, {threshold: 0.1});
document.querySelectorAll(".fade-up").forEach(el => observer.observe(el));
</script>
